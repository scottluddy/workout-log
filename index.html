<script>
  window.addEventListener('error', function (e) {
    var d = document.getElementById('__diag_err');
    if (!d) return;
    d.style.display = 'block';
    d.textContent = (d.textContent ? d.textContent + '\n' : '') + '[error] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : '');
  });
  window.addEventListener('unhandledrejection', function (e) {
    var d = document.getElementById('__diag_err');
    if (!d) return;
    d.style.display = 'block';
    d.textContent = (d.textContent ? d.textContent + '\n' : '') + '[promise] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
  });
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && !root.firstChild) {
      var d = document.getElementById('__diag_err');
      if (d) {
        d.style.display = 'block';
        d.textContent = (d.textContent ? d.textContent + '\n' : '') +

        if (parts.length !== 2)
            return;
        const dk = parts[0], rid = parts[1];
        const weight = entries[k];
        if (!weight)
            return;
        const reps = [];
        for (let si = 0; si < 5; si++) {
            const rv = entries[`rd|${pid}|${dk}|${rid}|${si}`];
            if (rv)
                reps.push(rv);
        }
        if (!reps.length)
            return;
        const name = axResolveExerciseName(ridToName, entries, pid, dk, rid);
        if (!byExercise[name])
            byExercise[name] = [];
        byExercise[name].push({ date: dk, weight, reps });
    });
    const lines = [];
    lines.push("This is my workout log data, exported from my personal training app. Please analyze trends across it — progress, plateaus, consistency, anything worth flagging. Be direct and genuinely honest, not just encouraging — if something looks like it's stalled, regressing, or inconsistent, say so plainly rather than softening it. One important caveat: I sometimes change equipment or something about how an exercise is performed, which can cause a large jump or drop in logged weight that has nothing to do with actual strength change — treat unusually large jumps between sessions as a likely sign that something about the exercise changed, not as a real performance swing, unless the surrounding data suggests otherwise.");
    lines.push("");
    lines.push("WORKOUT LOG — ANALYSIS EXPORT");
    lines.push(`Generated: ${dateKey(new Date())}`);
    lines.push(`Program: ${activeProgram.name} (${activeProgram.kind === "weekly" ? "Weekly" : "Custom"})`);
    lines.push("");
    const names = Object.keys(byExercise).sort();
    if (!names.length) {
        lines.push("No logged sets found for this program yet.");
    }
    else {
        lines.push("=== EXERCISE HISTORY (weight lb x reps per set, oldest to newest) ===");
        lines.push("");
        names.forEach((name) => {
            lines.push(`## ${name}`);
            const rows = byExercise[name].slice().sort((a, b) => a.date.localeCompare(b.date));
            rows.forEach((r) => { lines.push(`${r.date}: ${r.weight} lb x [${r.reps.join(", ")}]`); });
            lines.push("");
        });
    }
    const bcDates = Object.keys(bcEntries || {}).filter((dk) => bcEntries[dk] && (bcEntries[dk].actualWeight || bcEntries[dk].bf)).sort();
    if (bcDates.length) {
        lines.push("=== BODY COMPOSITION (date: weight, BF%, waist, belly) ===");
        lines.push("");
        bcDates.forEach((dk) => {
            const e = bcEntries[dk];
            lines.push(`${dk}: ${e.actualWeight || "—"}, ${e.bf || "—"}%, waist ${e.waist || "—"}, belly ${e.belly || "—"}`);
        });
        lines.push("");
    }
    return lines.join("\n");
}
