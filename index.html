<script>
  window.addEventListener('error', function (e) {
    var d = document.getElementById('__diag_err');
    if (!d) return;
    d.style.display = 'block';
    d.textContent = (d.textContent ? d.textContent + '\n' : '') + '[error] ' + (e.message || e.type) +

  });

    var d = document.getElementById('__diag_err');
    if (!d) return;
    d.style.display = 'block';
    d.textContent = (d.textContent ? d.textContent + '\n' : '') + '[promise] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
  });
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && !root.firstChild) {
      var d = document.getElementById('__diag_err');
      if (d) {
        d.style.display = 'block';
        d.textContent = (d.textContent ? d.textContent + '\n' : '') +
